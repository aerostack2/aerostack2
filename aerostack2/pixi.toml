[package]
name = "aerostack2"
version = "0.0.0"

[package.build]
backend = { name = "pixi-build-ros", version = "*" }

[package.build.config]
extra-package-mappings = [{
  as2_alphanumeric_viewer = { conda = [] },
  as2_behavior = { conda = [] },
  as2_behavior_tree = { conda = [] },
  as2_behaviors_motion = { conda = [] },
  as2_behaviors_param_estimation = { conda = [] },
  as2_behaviors_path_planning = { conda = [] },
  as2_behaviors_payload = { conda = [] },
  as2_behaviors_perception = { conda = [] },
  as2_behaviors_platform = { conda = [] },
  as2_behaviors_swarm_flocking = { conda = [] },
  as2_behaviors_trajectory_generation = { conda = [] },
  as2_cli = { conda = [] },
  as2_core = { conda = [] },
  as2_external_object_to_tf = { conda = [] },
  as2_gazebo_assets = { conda = [] },
  as2_geozones = { conda = [] },
  as2_keyboard_teleoperation = { conda = [] },
  as2_map_server = { conda = [] },
  as2_motion_controller = { conda = [] },
