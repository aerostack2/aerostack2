  as2_realsense_interface = { conda = [] },
  as2_rviz_plugins = { conda = [] },
  as2_state_estimator = { conda = [] },
  as2_usb_camera_interface = { conda = [] },
  as2_visualization = { conda = [] },
}]

[package.run-dependencies]
