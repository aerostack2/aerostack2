/**:
  ros__parameters:
    simple_ekf:
      verbose: true  # Enable verbose logging for debugging purposes.
      debug_verbose: false  # Enable additional debug logging for EKF internals (e.g., state, covariance).
      timer_hz: 100.0  # EKF update rate in Hz (default: 100 Hz).
      gravity: 9.81  # Gravitational acceleration (m/s^2).
      earth_map_transform: # By default, the plugin will set the earth to map transform on the first received pose.
        static_tf: true  # Publish earth to map as tf_static (true) or dynamic tf (false).
        set_earth_map: false  # Manually set earth to map transform if true.
        position:
          x: 0.0
          y: 0.0
          z: 0.0
        orientation:
          roll: 0.0
          pitch: 0.0
          yaw: 0.0
      initial_covariance:
        position: 0.0       # Initial variance for x, y, z position states.
        velocity: 0.0       # Initial variance for vx, vy, vz velocity states.
        orientation: 0.0    # Initial variance for roll, pitch, yaw orientation states.
        bias_acc: 1e-8      # Initial variance for accelerometer bias states (bax, bay, baz).
        bias_gyro: 1e-8     # Initial variance for gyroscope bias states (bwx, bwy, bwz).
      offboard_topic: "platform/info"  # Topic to subscribe for platform offboard status.
      predict_topic: "sensor_measurements/imu"  # Topic to subscribe for EKF prediction step.
      imu_params:
        accelerometer_noise_density: 1e-3
        gyroscope_noise_density: 1e-4
        accelerometer_random_walk: 1e-4
        gyroscope_random_walk: 1e-5
      update_topics:  # List of topics to subscribe for EKF update step.
        - "gazebo"
      gazebo:
        topic: "ground_truth/pose"  # Topic to subscribe for pose measurements.
        type: "geometry_msgs/msg/PoseStamped"  # Message type: PoseStamped, PoseWithCovarianceStamped, nav_msgs/msg/Odometry, or mocap4r2_msgs/msg/RigidBodies.
        set_earth_map: true  # Use this topic to set earth to map transform.
        use_message_covariance: false  # If true: use message covariance (for PoseWithCovarianceStamped/Odometry) or multipliers, if false: use fixed covariance values.
        position_covariance: [1e-4, 1e-4, 1e-4] # Fixed covariance values: x, y, z (used when use_message_covariance=false)
        orientation_covariance: [1e-5, 1e-5, 1e-5] # Fixed covariance values: roll, pitch, yaw (used when use_message_covariance=false)
        # position_multiplier: [1.0, 1.0, 1.0] # Covariance multipliers: x, y, z (used when use_message_covariance=true with PoseWithCovarianceStamped/Odometry)
        # orientation_multiplier: [1.0, 1.0, 1.0] # Covariance multipliers: roll, pitch, yaw (used when use_message_covariance=true with PoseWithCovarianceStamped/Odometry)
      # Example: mocap4r2_msgs/msg/RigidBodies topic (add "mocap" to update_topics to enable)
      # mocap:
      #   topic: "mocap/rigid_bodies"  # Topic to subscribe for mocap rigid body measurements.
      #   type: "mocap4r2_msgs/msg/RigidBodies"  # Message type for Vicon/OptiTrack via mocap4r2.
      #   rigid_body_name: "33"  # Name of the rigid body to track (must match mocap system config).
      #   set_earth_map: true  # Use this topic to set earth to map transform.
      #   use_message_covariance: false  # RigidBodies has no covariance — always uses fixed values.
      #   position_covariance: [1e-4, 1e-4, 1e-4]  # Fixed covariance: x, y, z.
      #   orientation_covariance: [1e-5, 1e-5, 1e-5]  # Fixed covariance: roll, pitch, yaw.