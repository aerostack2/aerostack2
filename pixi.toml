[workspace]
preview = ["pixi-build"]
authors = ["Alvaro Gaona <alvgaona@gmail.com>"]
channels = ["conda-forge"]
name = "aerostack2"
platforms = [
  "linux-64",
  "linux-aarch64",
  "osx-arm64"
]
version = "1.1.3"

[tasks]
clean = "rm -rf build/ install/ log/"
gen-compile-flags = "./scripts/gen-compile-flags.sh"
merge-compile-commands = "./scripts/merge-compile-commands.sh"
build-pkg = "./scripts/build-pkg.sh"
build = "./scripts/build.sh"
test-pkg = "sh -c 'colcon test --packages-up-to \"$0\" --event-handlers console_direct+'"
test-result = "colcon test-result --verbose"

