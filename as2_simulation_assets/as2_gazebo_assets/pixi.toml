[package]
name = "as2_gazebo_assets"
version = "0.0.0"

[package.build]
backend = { name = "pixi-build-ros", version = "*" }

[package.build.config]
extra-package-mappings = [{ as2_core = { conda = [] }, "python3-jinja2" = { conda = ["jinja2"] }, "python3-pydantic" = { conda = ["pydantic"] }, "python3-pytest" = { conda = ["pytest"] } }]

[package.host-dependencies]
as2_core = { path = "../../as2_core" }
# pin: 6.16.0 osx-arm64 dropped the ignition-math6-eigen3 cmake config still required by find_dependency
libignition-math6 = "<6.16"

[package.run-dependencies]
as2_core = { path = "../../as2_core" }
# pin: 6.16.0 osx-arm64 dropped the ignition-math6-eigen3 cmake config still required by find_dependency
libignition-math6 = "<6.16"
