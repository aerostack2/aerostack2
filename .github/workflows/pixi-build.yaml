name: pixi

on:
  pull_request:
    types: [review_requested, ready_for_review]
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: build-${{ matrix.env }}-${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        env: [humble, jazzy]
        platform: [linux-64, linux-aarch64, osx-arm64]
        include:
          - platform: linux-64
            runner: ubuntu-latest
          - platform: linux-aarch64
            runner: ubuntu-24.04-arm
          - platform: osx-arm64
            runner: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.8
        with:
          pixi-version: v0.67.2
          run-install: false

      - name: Build workspace
        run: pixi install -e ${{ matrix.env }}
