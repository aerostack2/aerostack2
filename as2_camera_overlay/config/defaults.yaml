/**:
  ros__parameters:
    fixed_frame: earth
    near_plane: 0.05
    far_plane: 1000.0
    zoom_factor: 1.0
    render_scale: 0.5
    max_render_fps: 0.0

    input:
      image_topic: /drone0/sensor_measurements/image_raw
      camera_info_topic: /drone0/sensor_measurements/camera_info

    output:
      topic: /drone0/sensor_measurements/image_with_markers

    displays_yaml: |
      - class: rviz_default_plugins/Grid
        name: world_grid
        properties:
          Reference Frame: "<Fixed Frame>"
          Plane Cell Count: 25
          Cell Size: 1.0
          Color: "128; 128; 128"
          Alpha: 0.5

      - class: rviz_default_plugins/MarkerArray
        name: gates_static
        properties:
          Topic: /gates_static

      - class: rviz_default_plugins/MarkerArray
        name: gates_tracker
        properties:
          Topic: /gates_tracker

      - class: rviz_default_plugins/TF
        name: tf_axes
        properties:
          Show Axes: true
          Show Names: false
          Marker Scale: 0.5
