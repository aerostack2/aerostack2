/**:
  ros__parameters:
    persistent: true
    
    camera_image_topic: ""
    camera_info_topic: "sensor_measurements/camera/camera_info"
    enable_rectification: false
    use_sim_time: False
   
    # Embedded camera driver (as2_usb_camera_interface): used when camera_image_topic is empty.
    # Works with any camera type.
    arducam: false
    device: "/dev/video0"
    framerate: 30.0
    publish_images: true

    pipeline:
      stages: ["detector"]
      detector:
        plugin: "aruco"
        input_source: "image"
        publish_output: true
        output_topic: "detections_data"
        enable_debug: true
        debug_poses_topic: "debug/detection_poses"
    aruco:
      tag_dict: "6x6_250"
      marker_size: 0.15
      estimate_pose: true
